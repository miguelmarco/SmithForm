name = "Smith"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Smith"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.27.0-rc1"

[[lean_lib]]
name = "Smith"

[[lean_exe]]
name = "SmithFormZ"
root = "SmithFormZ"
moreCcArgs = ["-O3"]

[[lean_exe]]
name = "SmithFormQ"
root = "SmithFormQ"
moreCcArgs = ["-O3"]